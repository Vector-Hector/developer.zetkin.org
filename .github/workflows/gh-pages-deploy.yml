name: Deploy GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm install

      - name: Generate dummy OpenAPI file
        run: |
          # Create a simple dummy openapi.json
          echo '{
            "openapi": "3.0.0",
            "info": {
              "title": "Dummy API",
              "version": "1.0.0"
            },
            "paths": {
              "/orgs/{org_id}/people": {
                "get": {
                  "operationId": "get--orgs-{org_id}-people",
                  "responses": {}
                }
              }
            }
          }' > openapi.json

          # Create directories
          mkdir -p api/v1
          mkdir -p api/v2

          # Move dummy file into both directories
          cp openapi.json api/v1/openapi.json
          cp openapi.json api/v2/openapi.json

          # Run the Docusaurus API docs generation
          npm run docusaurus gen-api-docs all
        env:
          NODE_ENV: production

      - name: Build site
        run: |
          npm run build
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build